<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Donate — Western Water Collaborative</title>
  <style>
    :root{
      --nav:#1e2f57;
      --ink:#111;
      --muted:#555;
      --max:900px;
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      background:#fff;
    }

    header{
      background:var(--nav);
      color:#fff;
      padding:14px 16px;
    }

    header a{
      color:#fff;
      text-decoration:none;
      font-weight:700;
    }

    main{
      width:min(calc(100vw - 48px), var(--max));
      margin:0 auto;
      padding:38px 0;
    }

    h1{
      margin:0 0 10px;
      font-size:40px;
    }

    p{
      margin:0;
      font-size:18px;
      color:var(--muted);
    }

    .box{
      margin-top:40px;
      border:2px solid #000;
      padding:40px 18px;
      text-align:center;   /* centers text */
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Back to Western Water Collaborative</a>
  </header>

  <main>
    <h1>Donate</h1>
    <div class="box">
      <p>Under construction.</p>
    </div>
  </main>
</body>
</html>
